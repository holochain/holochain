# Operates on open PRs and automatically rebases the PR branch onto the target branch.
# Like autoupdate.yaml, but with rebasing instead of merging.

# It is triggered on a PR if labeled `autorebase:opt-in`.
#
# Uses the GitHub CLI directly (`gh pr update-branch --rebase`) to perform the rebase.

name: autorebase

on:
    # Run on every push on develop
    push:
        branches:
            - "develop"
            - "develop-*"
    # Run when pull requests get labeled
    pull_request:
        types: [labeled, opened, ready_for_review, reopened]
        branches:
            - "develop"
            - "develop-*"

jobs:
    rebase:
        runs-on: ubuntu-latest
        env:
            # We can't use the built-in secrets.GITHUB_TOKEN yet because of this limitation:
            # https://github.community/t5/GitHub-Actions/Triggering-a-new-workflow-from-another-workflow/td-p/31676
            # In the meantime, use a token granting write access on the repo:
            # - a GitHub App token
            #   See https://github.com/marketplace/actions/github-app-token.
            # - a personal access token
            #   See https://help.github.com/en/articles/creating-a-personal-access-token-for-the-command-line.
            GH_TOKEN: ${{ secrets.HRA_GITHUB_TOKEN }}
            GH_REPO: ${{ github.repository }}
        steps:
            - name: Rebase the labeled PR
              if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'autorebase:opt-in')
              env:
                  PR_NUMBER: ${{ github.event.pull_request.number }}
              run: gh pr update-branch "$PR_NUMBER" --rebase

            - name: Rebase all opted-in PRs targeting "${{ github.ref_name }}"
              if: github.event_name == 'push'
              env:
                  BASE_REF: ${{ github.ref_name }}
              run: |
                  status=0
                  prs=$(gh pr list --limit 1000 --base "$BASE_REF" --label "autorebase:opt-in" --state open --json number --jq '.[].number')
                  for pr in $prs; do
                      echo "Rebasing PR #$pr"
                      if ! gh pr update-branch "$pr" --rebase; then
                          echo "::error::Failed to rebase PR #$pr"
                          status=1
                      fi
                  done
                  exit $status
