name: test

on:
  pull_request:
    branches:
      - develop
      - develop-*

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: "-Dwarnings"
  RUST_BACKTRACE: 1

jobs:
  static:
    name: static
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v5

      - name: "Common Test Setup Actions"
        uses: ./.github/actions/common-pre

      # we cannot use cmake 4 until openssl-src is updated
      - name: cmake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: "3.31.x"

      - name: static-fmt
        run: make static-fmt

      - name: static-toml
        run: make static-toml

      - name: static-clippy
        run: make static-clippy

      - name: static-clippy-unstable
        run: make static-clippy-unstable

      - name: static-doc
        run: make static-doc

      - name: "Common Test Teardown Actions"
        uses: ./.github/actions/common-post

  test-wasmer-sys-cranelift:
    name: test (wasmer-sys-cranelift)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: wasmer-sys-cranelift
          - os: ubuntu-latest
            target: wasmer-sys-cranelift-unstable
          - os: ubuntu-latest
            target: wasmer-sys-cranelift-transport_tx5
          - os: macos-latest
            target: wasmer-sys-cranelift
          - os: depot-windows-2025-8
            target: wasmer-sys-cranelift
    steps:
      - name: checkout
        uses: actions/checkout@v5

      - name: "Common Test Setup Actions"
        uses: ./.github/actions/common-pre

      - name: "Build workspace and run tests"
        uses: ./.github/actions/common-test
        with:
          os: ${{ matrix.os }}
          target: ${{ matrix.target }}
          influx-token: ${{ secrets.INFLUX_TOKEN }}

  # The `wasmer-wasmi` tests are split out into a separate job so we can ignore its failures in the `ci-pass` job.
  # This allows the workflow to pass, while still showing the `test-wasmer-wasmi` job as failed in the UI.
  test-wasmer-wasmi:
    name: test (wasmer-wasmi)
    # Our intended target for wasmer-wasmi feature is iOS and Android.
    # For now, wasmer-wasmi tests are only run on ubuntu-latest
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v5

      - name: "Common Test Setup Actions"
        uses: ./.github/actions/common-pre
        
      - name: "Build workspace and run tests"
        uses: ./.github/actions/common-test
        with:
          os: "ubuntu-latest"
          target: "wasmer-wasmi"
          influx-token: ${{ secrets.INFLUX_TOKEN }}

  ci-pass:
    if: ${{ always() }}
    name: "All Jobs Pass"
    runs-on: "ubuntu-latest"
    needs:
      - static
      - test-wasmer-sys-cranelift
      - test-wasmer-wasmi
    steps:
      - name: check status
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
          allowed-failures: test-wasmer-wasmi
