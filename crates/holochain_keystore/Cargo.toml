[package]
name = "holochain_keystore"
version = "0.7.0-rc.2"
description = "keystore for libsodium keypairs"
license = "Apache-2.0"
repository = "https://github.com/holochain/holochain"
documentation = "https://docs.rs/holochain_keystore"
authors = ["Holochain Core Dev Team <devcore@holochain.org>"]
keywords = ["holochain", "holo", "nacl", "libsodium", "cryptography"]
categories = ["cryptography"]
edition = "2021"

# reminder - do not use workspace deps
[dependencies]
async-trait = "0.1"
base64 = "0.22"
derive_more = { version = "2.0", features = ["from"] }
futures = "0.3"
holo_hash = { version = "^0.7.0-rc.1", path = "../holo_hash", features = [
  "full",
] }
holochain_serialized_bytes = "=0.0.57"
holochain_types = { version = "^0.7.0-rc.3", path = "../holochain_types" }
holochain_zome_types = { version = "^0.7.0-rc.2", path = "../holochain_zome_types" }
holochain_secure_primitive = { version = "^0.7.0-rc.1", path = "../holochain_secure_primitive" }
holochain_util = { version = "^0.7.0-rc.1", path = "../holochain_util" }
lair_keystore = { version = "0.7.1", default-features = false, features = [
  "rusqlite-bundled-sqlcipher-vendored-openssl",
] }
must_future = "0.1.2"
nanoid = "0.4"
one_err = "0.0.8"
opentelemetry = "0.31"
parking_lot = "0.12"
schemars = "0.9"
serde = { version = "1.0", features = ["derive"] }
shrinkwraprs = "0.3"
sodoken = "0.1.0"
thiserror = "2.0"
tokio = { version = "1.27", features = ["full"] }
tracing = "0.1"
url2 = "0.0.6"

[dev-dependencies]
holochain_timestamp = { version = "0.7.0-rc.1", path = "../timestamp" }
assert_cmd = "2.0.4"
yaml_serde = "0.10"
tempfile = "3.23"

[lints]
workspace = true

[features]
default = []

test_utils = []

instrument = []
