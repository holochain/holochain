[package]
name = "holochain_cascade"
version = "0.7.0-dev.24"
description = "Logic for cascading updates to Holochain state and network interaction"
license = "Apache-2.0"
repository = "https://github.com/holochain/holochain"
documentation = "https://docs.rs/holochain_cascade"
authors = ["Holochain Core Dev Team <devcore@holochain.org>"]
edition = "2021"

# reminder - do not use workspace deps
[dependencies]
fixt = { version = "^0.7.0-dev.1", path = "../fixt" }
futures = "0.3"
holo_hash = { version = "^0.7.0-dev.9", path = "../holo_hash", features = [
  "full",
] }
holochain_sqlite = { version = "^0.7.0-dev.19", path = "../holochain_sqlite" }
holochain_p2p = { version = "^0.7.0-dev.24", default-features = false, path = "../holochain_p2p" }
holochain_serialized_bytes = "=0.0.57"
holochain_state = { version = "^0.7.0-dev.24", path = "../holochain_state" }
holochain_types = { version = "^0.7.0-dev.23", path = "../holochain_types" }
holochain_trace = { version = "^0.7.0-dev.1", path = "../holochain_trace" }
holochain_util = { version = "^0.7.0-dev.1", path = "../holochain_util" }
holochain_zome_types = { version = "^0.7.0-dev.15", path = "../holochain_zome_types" }
parking_lot = "0.12.1"
tokio = { version = "1.36.0", features = ["full"] }
thiserror = "2.0"
tracing = "0.1"
opentelemetry = "0.31"

kitsune2_api = "0.5.0-dev.1"

async-trait = "0.1"
mockall = { version = "0.13", optional = true }

[dev-dependencies]
holochain_cascade = { path = ".", default-features = false, features = [
  "test_utils",
] }

pretty_assertions = "1.4"
test-case = "3.3"

[lints]
workspace = true

[features]
default = ["transport-iroh"]

test_utils = [
  "dep:mockall",
  "holochain_p2p/test_utils",
  "holochain_types/test_utils",
  "holochain_state/test_utils",
]

instrument = []

sqlite-encrypted = [
  "holo_hash/sqlite-encrypted",
  "holochain_sqlite/sqlite-encrypted",
  "holochain_state/sqlite-encrypted",
  "holochain_types/sqlite-encrypted",
  "holochain_zome_types/sqlite-encrypted",
]
sqlite = [
  "holo_hash/sqlite",
  "holochain_sqlite/sqlite",
  "holochain_state/sqlite",
  "holochain_types/sqlite",
  "holochain_zome_types/sqlite",
]

transport-iroh = ["holochain_p2p/transport-iroh"]

transport-tx5-backend-go-pion = ["holochain_p2p/transport-tx5-backend-go-pion"]
