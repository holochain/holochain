[package]
name = "holochain_cascade"
version = "0.7.0-rc.2"
description = "Logic for cascading updates to Holochain state and network interaction"
license = "Apache-2.0"
repository = "https://github.com/holochain/holochain"
documentation = "https://docs.rs/holochain_cascade"
authors = ["Holochain Core Dev Team <devcore@holochain.org>"]
edition = "2021"

# reminder - do not use workspace deps
[dependencies]
fixt = { version = "^0.7.0-rc.1", path = "../fixt" }
futures = "0.3"
holo_hash = { version = "^0.7.0-rc.1", path = "../holo_hash", features = [
  "full",
] }
holochain_keystore = { version = "^0.7.0-rc.1", path = "../holochain_keystore" }
holochain_p2p = { version = "^0.7.0-rc.2", default-features = false, path = "../holochain_p2p" }
holochain_serialized_bytes = "=0.0.57"
holochain_state = { version = "^0.7.0-rc.2", path = "../holochain_state" }
holochain_types = { version = "^0.7.0-rc.2", path = "../holochain_types" }
holochain_util = { version = "^0.7.0-rc.1", path = "../holochain_util" }
holochain_zome_types = { version = "^0.7.0-rc.1", path = "../holochain_zome_types" }
parking_lot = "0.12.1"
tokio = { version = "1.36.0", features = ["full"] }
thiserror = "2.0"
tracing = "0.1"
opentelemetry = "0.31"

kitsune2_api = "0.5.0-dev.6"

async-trait = "0.1"
mockall = { version = "0.13", optional = true }

[dev-dependencies]
holochain_cascade = { path = ".", default-features = false, features = [
  "test_utils",
] }

[lints]
workspace = true

[features]
test_utils = [
  "dep:mockall",
  "holochain_p2p/test_utils",
  "holochain_types/test_utils",
  "holochain_state/test_utils",
]

instrument = []
