[package]
name = "holochain_conductor_api"
version = "0.7.0-rc.3"
description = "Message types for Holochain admin and app interface protocols"
license = "Apache-2.0"
repository = "https://github.com/holochain/holochain"
documentation = "https://docs.rs/holochain_conductor_api"
authors = ["Holochain Core Dev Team <devcore@holochain.org>"]
edition = "2021"

# reminder - do not use workspace deps
[dependencies]
kitsune2_transport_iroh = { version = "0.5.0-dev.6", optional = true, default-features = false }
derive_more = { version = "2.0", features = ["from"] }
holo_hash = { version = "^0.7.0-rc.1", path = "../holo_hash", features = [
  "full",
] }
holochain_state_types = { version = "^0.7.0-rc.2", path = "../holochain_state_types" }
holochain_serialized_bytes = "=0.0.57"
holochain_types = { version = "^0.7.0-rc.3", path = "../holochain_types" }
holochain_zome_types = { version = "^0.7.0-rc.2", path = "../holochain_zome_types" }
holochain_util = { version = "^0.7.0-rc.1", default-features = false, path = "../holochain_util", features = [
  "jsonschema",
] }
kitsune2_api = "0.5.0-dev.6"
kitsune2_core = { version = "0.5.0-dev.6" }
kitsune2_gossip = { version = "0.5.0-dev.6", optional = true }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1"
yaml_serde = "0.10"
tracing = "0.1.26"
thiserror = "2.0"
url2 = "0.0.6"
holochain_keystore = { version = "^0.7.0-rc.2", path = "../holochain_keystore" }
shrinkwraprs = "0.3.0"
indexmap = { version = "2.6.0", features = ["serde"] }
schemars = "0.9"
num_cpus = "1.17.0"
nanoid = "0.4"
serde_with = "3.12.0"

[dev-dependencies]
holochain_conductor_api = { path = ".", features = ["test-utils", "schema"] }

serde_json = "1.0"
rmp-serde = "1.3"
matches = { version = "0.1.8" }
holochain_trace = { version = "^0.7.0-rc.1", path = "../holochain_trace" }
pretty_assertions = "1.4"
jsonschema = "0.45"
fixt = { version = "^0.7.0-rc.1", path = "../fixt" }

[lints]
workspace = true

[features]
unstable-migration = []
unstable-sharding = []
unstable-countersigning = []
schema = [
  "kitsune2_gossip/schema",
  "kitsune2_core/schema",
  "kitsune2_transport_iroh?/schema",
]

test-utils = []
